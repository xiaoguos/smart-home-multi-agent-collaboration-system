events {
    worker_connections 1024;
}

http {
    upstream conductor_agent {
        server smart-home-agents:12002;
    }
    
    upstream air_conditioner_agent {
        server smart-home-agents:12000;
    }
    
    upstream air_cleaner_agent {
        server smart-home-agents:12001;
    }
    
    upstream data_mining_agent {
        server smart-home-agents:12003;
    }

    # 总管理代理
    server {
        listen 80;
        server_name conductor.localhost;
        
        location / {
            proxy_pass http://conductor_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 空调代理
    server {
        listen 80;
        server_name ac.localhost;
        
        location / {
            proxy_pass http://air_conditioner_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 空气净化器代理
    server {
        listen 80;
        server_name cleaner.localhost;
        
        location / {
            proxy_pass http://air_cleaner_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 数据挖掘代理
    server {
        listen 80;
        server_name analytics.localhost;
        
        location / {
            proxy_pass http://data_mining_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 默认服务器 - 总管理代理
    server {
        listen 80 default_server;
        server_name _;
        
        location / {
            proxy_pass http://conductor_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
