# 数据库配置
database:
  # 数据库类型
  type: "starrocks"
  
  # StarRocks 连接配置
  starrocks:
    host: "192.168.110.130"
    port: 9030
    user: "root"
    password: "123456"
    database: "smart_home"
    charset: "utf8mb4"
    
    # 连接池配置
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
    pool_recycle: 3600

# 本地开发模式（可选）
development:
  debug: false
  test_mode: false
